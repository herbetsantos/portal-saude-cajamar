<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trocar senha — Portal Saúde Cajamar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="brand"><img src="/assets/CAJAMAR PREFEITURA.png" alt="Prefeitura de Cajamar — Saúde"></div>
      <div class="login-title">Troca de senha obrigatória</div>
      <div class="login-subtitle">Por segurança, defina uma nova senha antes de continuar. Use a senha provisória que o administrador te passou como "senha atual".</div>

      <div id="formMsg" class="form-msg"></div>

      <form id="changeForm">
        <div class="field">
          <label for="curPass">Senha atual (provisória)</label>
          <input type="password" id="curPass" autocomplete="current-password" required>
        </div>
        <div class="field">
          <label for="newPass">Nova senha</label>
          <input type="password" id="newPass" autocomplete="new-password" required minlength="8">
        </div>
        <div class="field">
          <label for="newPass2">Confirmar nova senha</label>
          <input type="password" id="newPass2" autocomplete="new-password" required minlength="8">
        </div>
        <button type="submit" class="btn btn--accent" id="submitBtn">Salvar nova senha</button>
      </form>

      <div class="login-foot">Prefeitura Municipal de Cajamar · Secretaria de Saúde</div>
    </div>
  </div>

  <script>
    // Para onde ir depois de trocar a senha. Só aceitamos caminhos internos
    // (começando com "/"), nunca URLs externas.
    const params = new URLSearchParams(window.location.search);
    const nextParam = params.get('next');
    const nextUrl = nextParam && nextParam.startsWith('/') ? nextParam : '/portal.html';

    const form = document.getElementById('changeForm');
    const msg = document.getElementById('formMsg');
    const submitBtn = document.getElementById('submitBtn');

    // Garante que o usuário está autenticado. Se já tiver trocado a senha
    // (ex.: acessou esta página de novo por engano), manda pro destino.
    (async () => {
      try {
        const res = await fetch('/api/me', { credentials: 'same-origin' });
        if (!res.ok) {
          window.location.href = '/login.html';
          return;
        }
        const data = await res.json();
        if (!data.user || !data.user.mustChangePassword) {
          window.location.href = nextUrl;
        }
      } catch {
        window.location.href = '/login.html';
      }
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'form-msg';
      msg.textContent = '';

      const newPass = document.getElementById('newPass').value;
      const newPass2 = document.getElementById('newPass2').value;
      if (newPass !== newPass2) {
        msg.className = 'form-msg is-error';
        msg.textContent = 'As senhas não coincidem.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Salvando…';

      try {
        const res = await fetch('/api/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            currentPassword: document.getElementById('curPass').value,
            newPassword: newPass,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Não foi possível trocar a senha.');
        window.location.href = nextUrl;
      } catch (err) {
        msg.className = 'form-msg is-error';
        msg.textContent = err.message;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Salvar nova senha';
      }
    });
  </script>
</body>
</html>
