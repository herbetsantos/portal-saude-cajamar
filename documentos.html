<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documentos Úteis — Portal Saúde Cajamar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar__left">
    <a class="brand" href="/portal.html"><img src="/assets/logo.png" alt="Prefeitura de Cajamar — Saúde"></a>
    <nav class="nav">
      <div class="nav__item">
        <button class="nav__link" id="ferramentasTrigger" type="button">
          <span class="label-text">FERRAMENTAS</span><span class="nav__caret"></span>
        </button>
        <div class="submenu" id="ferramentasMenu"></div>
      </div>
      <div class="nav__item">
        <a class="nav__link is-open" href="/documentos.html" style="background:rgba(255,255,255,0.14)"><span class="label-text">DOCUMENTOS ÚTEIS</span></a>
      </div>
      <div class="nav__item">
        <a class="nav__link" href="/manuais.html"><span class="label-text">MANUAIS DE USO</span></a>
      </div>
      <div class="nav__item">
        <a class="nav__link" id="adminLink" href="/admin.html" style="display:none"><span class="label-text">ADMINISTRAÇÃO</span></a>
      </div>
    </nav>
  </div>
  <div class="topbar__right">
    <div class="user-chip" id="userChip"></div>
    <button class="btn btn--ghost-light btn--sm" id="logoutBtn" type="button">Sair</button>
  </div>
</header>

<main class="page">
  <div class="page__header">
    <div class="eyebrow">Biblioteca</div>
    <h1 class="page__title">Documentos Úteis</h1>
    <p class="page__subtitle">Formulários, portarias, modelos e outros materiais de referência da Secretaria de Saúde.</p>
  </div>

  <div id="listArea">
    <div class="skeleton-loading">Carregando documentos…</div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
  (async () => {
    const user = await initPortalChrome();
    if (!user) return;

    const area = document.getElementById('listArea');
    try {
      const res = await fetch('/api/links?category=documento', { credentials: 'same-origin' });
      const data = await res.json();
      const items = data.links || [];
      area.innerHTML = items.length
        ? `<div class="doc-list">${items.map((it) => `
            <a class="doc-row" href="${escapeAttr(it.url)}" target="_blank" rel="noopener">
              <span class="cross">✚</span>
              <div style="flex:1">
                <div class="doc-row__title">${escapeHtml(it.title)}</div>
                ${it.description ? `<div class="doc-row__desc">${escapeHtml(it.description)}</div>` : ''}
              </div>
            </a>
          `).join('')}</div>`
        : `<div class="empty-state">Nenhum documento cadastrado ainda.</div>`;
    } catch {
      area.innerHTML = `<div class="empty-state">Não foi possível carregar os documentos.</div>`;
    }
  })();
</script>
</body>
</html>
