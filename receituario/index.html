<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receita de Controle Especial</title>
<link rel="stylesheet" href="/css/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Montserrat',Arial,Helvetica,sans-serif}
body{font-family:'Montserrat',Arial,Helvetica,sans-serif;background:#e8e8e8;margin:0;padding:0;font-size:12px}

/* ── TELA ── */
.screen-wrapper{display:flex;align-items:flex-start;min-height:100vh;gap:0}
.sidebar{width:380px;min-width:300px;background:#fff;border-right:1px solid #ccc;padding:14px}
.preview{flex:1;padding:12px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;justify-content:flex-start;position:sticky;top:68px;align-self:flex-start;max-height:calc(100vh - 68px);overflow-y:auto}

.sidebar h1{font-size:13px;font-weight:400;color:#203B90;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:6px}
.sec{font-size:11px;font-weight:700;color:#fff;background:#203B90;letter-spacing:.5px;padding:4px 7px;border-radius:4px;margin:10px 0 6px}
.f{margin-bottom:6px;}
.f label{display:block;font-size:12px;color:#444;font-weight:500;margin-bottom:12px;text-transform:none}
.f input,.f textarea,.f select{width:100%;border:1px solid #bbb;border-radius:3px;padding:5px 6px;font-size:12px;font-family:'Montserrat',Arial,sans-serif;color:#111;background:#fafafa}
.f input:focus,.f textarea:focus,.f select:focus{outline:none;border-color:#203B90}
.f textarea{resize:vertical;min-height:55px}
.btn-print{width:100%;margin-top:12px;padding:9px;background:#203B90;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:400;cursor:pointer;letter-spacing:.5px}
.btn-print:hover{background:#162a66}
.btn-clear{width:100%;margin-top:5px;padding:6px;background:#fff;color:#888;border:1px solid #ddd;border-radius:5px;font-size:11px;cursor:pointer}

/* ── FOLHA A4 NA TELA ── */
.a4{width:210mm;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.15);display:flex;flex-direction:row;transform:scale(1.5);transform-origin:top center}
.a4:not(:last-child){margin-bottom:-48mm}
.via{width:105mm;min-height:148mm;padding:5mm 5mm 4mm;border-right:1px dashed #333;position:relative;display:flex;flex-direction:column;overflow:hidden}
.via:last-child{border-right:none}
.via-label{position:absolute;top:5mm;right:5mm;font-size:5.5px;color:#333;letter-spacing:.4px}

  /* ── CONTEÚDO DA VIA ── */
  .rec-title{text-align:center;font-size:8px;font-weight:700;color:#203B90;letter-spacing:.8px;margin-bottom:4px;text-transform:uppercase}
  .bar{background:#203B90;color:#fff;text-align:center;font-size:8px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 0;margin:4px 0 3px;border-radius:4px}
  .emitente{font-size:8px;color:#111;line-height:1.7;padding:0 1mm}
  .frow{display:flex;align-items:baseline;gap:2px;padding:2.5px 0;min-height:11px}
  .fl{font-size:8px;font-weight:400;color:#222;white-space:nowrap;min-width:60px}
  .fv{font-size:8px;color:#111;flex:1;word-break:break-word}
  .prescricao{flex:1;color:#111;line-height:1.8;min-height:25mm;box-sizing:border-box;white-space:normal;word-break:break-word;border:.7px solid #203B90;border-radius:4px;background:#fff;margin:3px 1mm 0;padding:3px 5px;font-size:8px}
  .ass-box{border:.7px solid #203B90;border-radius:4px;padding:3px 4px;margin:3px 1mm 0;font-weight:500}
  .ass-label{font-size:8px;color:#222;font-weight:500}
  .ass-val{font-size:8px;color:#111;min-height:10px;margin-top:2px}

  /* ── LOGOS ── */
  .logos-bar{width:100%;display:flex;justify-content:center}
  .logo{max-width:90%;height:auto;object-fit:contain}

  /* ── LISTA DE MEDICAMENTOS (SIDEBAR) ── */
  .med-row{border:1px solid #e0e0e8;border-radius:6px;padding:8px;margin-bottom:8px;background:#fafafe}
  .med-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .med-num{font-size:11px;font-weight:700;color:#203B90;text-transform:none;letter-spacing:.4px}
  .med-del{background:#fff;border:1px solid #e0a0a0;color:#c0392b;border-radius:4px;cursor:pointer;font-size:12px;line-height:1;padding:2px 7px}
  .med-del:hover{background:#fdeaea}
  .btn-add{width:100%;padding:7px;background:#eef;color:#203B90;border:1px dashed #203B90;border-radius:5px;font-size:12px;cursor:pointer;margin-bottom:6px}
  .btn-add:hover{background:#e2e2fb}

  /* ── MEDICAMENTOS NA VIA (PREVIEW/IMPRESSÃO) ── */
  .med{margin:2px 0}
  .med-nome{font-weight:700}
.med-linha{padding-left:9px;line-height:1.2;padding-top:0px;padding-bottom:0px}

  /* ── MEDIDOR DE PAGINAÇÃO (oculto, mede no tamanho de impressão) ── */
  .measure{position:fixed;left:-99999px;top:0;visibility:hidden;display:block}
  .measure .rec-title,.measure .bar,.measure .emitente,
  .measure .fl,.measure .fv,.measure .prescricao,
  .measure .ass-label,.measure .ass-val{font-size:12px}
  .measure .logos-bar{min-height:18mm}

  /* ── NAVEGAÇÃO ENTRE FOLHAS (somente na tela) ── */
  .sheets{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
  .pager{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px}
  .pager button{padding:5px 12px;background:#203B90;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:12px}
  .pager button:disabled{opacity:.4;cursor:default}
  .pager-info{font-size:12px;color:#444;font-weight:600}
  .a4--hide{display:none}

  /* ── PRINT ── */
  @media print{
    @page{size:A4 landscape;margin:0}
    html, body{width:100%;height:100%}
    body{background:#fff;margin:0;padding:0}
    #app-topbar{display:none!important}
    .screen-wrapper{display:block;padding-top:0!important}
    .sidebar{display:none!important}
    .preview{padding:0;display:block;position:static;max-height:none;overflow:visible}
    .a4{width:297mm;height:210mm;box-shadow:none;page-break-after:always;break-after:page;transform:none!important;margin-bottom:0!important}
    .a4:last-of-type{page-break-after:avoid;break-after:avoid}
    .via{width:50%;height:100%;min-height:100%}
    .via-label{display:block}
    .pager{display:none!important}
    .a4--hide{display:flex!important}
    .rec-title{font-size:12px!important}
    .bar{font-size:12px!important}
    .emitente{font-size:12px!important}
    .fl{font-size:12px!important}
    .fv{font-size:12px!important}
    .prescricao{font-size:12px!important}
    .ass-label{font-size:12px!important}
    .ass-val{font-size:12px!important}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>

    <div class="f"><label>CPF</label><input id="pac_cpf" placeholder="000.000.000-00" oninput="update()"></div>
    <div class="f"><label>Passaporte Nº (se estrangeiro)</label><input id="pac_pass" placeholder="Opcional" oninput="update()"></div>

    <div class="sec">Prescrição</div>
    <div id="meds"></div>

    <div class="sec">Data e Prescritor</div>
    <div class="f"><label>Data</label><input id="data" type="date" oninput="update()"></div>
    <div class="f"><label>Identificação do prescritor</label><input id="prescritor" placeholder="Nome, CRM" oninput="update()"></div>

    <div class="sec">Comprador</div>
    <div class="f"><label>Nome completo</label><input id="cmp_nome" placeholder="Nome do comprador" oninput="update()"></div>
    <div class="f"><label>CPF</label><input id="cmp_cpf" placeholder="000.000.000-00" oninput="update()"></div>
    <div class="f"><label>Passaporte Nº (se estrangeiro)</label><input id="cmp_pass" placeholder="Opcional" oninput="update()"></div>
    <div class="f"><label>Endereço completo</label><input id="cmp_end" placeholder="Endereço" oninput="update()"></div>
    <div class="f"><label>Cidade (UF)</label><input id="cmp_cidade" placeholder="Ex: Cajamar (SP)" oninput="update()"></div>
    <div class="f"><label>Telefone</label><input id="cmp_tel" placeholder="(11) 00000-0000" oninput="update()"></div>

    <button class="btn-print" onclick="window.print()">🖨️ Imprimir (A4 — 2 vias A5)</button>
    <button class="btn-clear" onclick="clearForm()">Limpar campos</button>
  </div>

  <!-- PREVIEW -->
  <div class="preview"></div>
</div>

<!-- Sugestões para os campos (o profissional pode escolher ou digitar) -->

  <option>1g</option><option>5mg/mL</option><option>10mg/mL</option><option>100mg/mL</option>
</datalist>

// ── Medicamentos ──────────────────────────────────────────────
const FORMAS = ['Comprimido','Comprimido revestido','Cápsula','Drágea',
  'Solução oral','Suspensão oral','Xarope','Gotas','Pomada','Creme','Gel',
  'Loção','Injetável','Supositório','Óvulo vaginal','Adesivo transdérmico',
  'Spray nasal','Aerossol / Inalação','Colírio','Pó para reconstituição','Outro'];

const POSOLOGIAS = ['1x ao dia','2x ao dia','3x ao dia','4x ao dia',
  'de 6/6 horas','de 8/8 horas','de 12/12 horas','à noite, ao deitar',
  'em jejum','antes das refeições','após as refeições','se necessário','uso contínuo'];

// Lê os medicamentos preenchidos na barra lateral (apenas linhas com nome)
function getMeds(){
  return [...document.querySelectorAll('#meds .med-row')].map(r => {
    const posSel = r.querySelector('.m-pos-sel').value;
    const posologia = posSel === '__outra__'
      ? r.querySelector('.m-pos-livre').value.trim()   // campo livre
      : posSel.trim();                                 // opção escolhida no menu

    return {
      nome:  r.querySelector('.m-nome').value.trim(),
      dose:  r.querySelector('.m-dose').value.trim(),
      forma: r.querySelector('.m-forma').value.trim(),
      posologia,
      fornecimento: (r.querySelector('.m-fornecimento-livre')?.value || '').trim(),
      duracao: (r.querySelector('.m-duracao-livre')?.value || '').trim(),
      recomendacoes: (r.querySelector('.m-recomendacoes-livre')?.value || '').trim()
    };
  }).filter(m => m.nome);
}

// HTML de um medicamento na via (numerado, no formato do modelo)
function medHtml(m, n){
  const titulo = [m.nome, m.dose].filter(Boolean).join(', ');
  let linhas = '';

  if(m.forma)        linhas += `<div class="med-linha">${esc(m.forma)}</div>`;
  if(m.posologia)   linhas += `<div class="med-linha">${esc(m.posologia)}</div>`;

  // Fornecimento/tempo/quantidade
  if(m.fornecimento) linhas += `<div class="med-linha">Fornecimento: ${esc(m.fornecimento)}</div>`;

  // Duração do tratamento
  if(m.duracao)      linhas += `<div class="med-linha">Duração do tratamento: ${esc(m.duracao)}</div>`;

  // Recomendações
  if(m.recomendacoes) linhas += `<div class="med-linha">Recomendações: ${esc(m.recomendacoes)}</div>`;

  return `<div class="med"><div class="med-nome">${n}. ${esc(titulo)}</div>${linhas}</div>`;
}

// Conteúdo da caixa de prescrição (subconjunto de medicamentos da folha)
function prescricaoHtml(meds, offset){
  return meds.map((m, i) => medHtml(m, offset + i + 1)).join('');
}

    ${frow('Nome Completo:', pNome)}
    ${frow('Endereço Completo:', pEnd)}
    ${frow('CPF:', pCpf)}
    ${frow('Passaporte Nº (se estrangeiro):', pPass)}
    <div class="bar">Prescrição</div>
    <div class="prescricao">${prescricaoHtml(meds, offset)}</div>
    <div class="ass-box">
      <div class="ass-label">DATA: ${dataFmt}</div>
      <div class="frow" style="margin-top:3px">
        <span class="ass-label">Identificação e Assinatura do Prescritor:</span>
        <span class="ass-val" style="flex:1;margin-left:4px">${esc(presc2)}</span>
      </div>
    </div>
    <div class="bar">Identificação do Comprador</div>
    ${frow('Nome Completo:', cNome)}
    ${frow('CPF:', cCpf)}
    ${frow('Passaporte Nº (se estrangeiro):', cPass)}
    ${frow('Endereço Completo:', cEnd)}
    ${frow('Cidade (UF):', cCid)}
    ${frow('Telefone:', cTel)}
    ${logosHtml()}
  `;
}

// ── Paginação automática ──────────────────────────────────────
// Mede a altura real do conteúdo no tamanho de IMPRESSÃO (via A5, fontes 12px)
// e distribui os medicamentos em folhas, criando novas quando faltar espaço.
const PX_PER_MM = 96 / 25.4;            // px por mm a 96dpi
const VIA_W_MM  = 138.5;                // largura útil da via impressa (148,5mm - margens)
const VIA_H_MM  = 201;                  // altura útil da via impressa (210mm - margens)
const SAFETY_MM = 10;                   // folga de segurança
const MAX_H_PX  = (VIA_H_MM - SAFETY_MM) * PX_PER_MM;

let _measurer = null;
function measureHeight(meds, offset){
  if(!_measurer){
    _measurer = document.createElement('div');
    _measurer.className = 'measure';
    _measurer.style.width = (VIA_W_MM * PX_PER_MM) + 'px';
    document.body.appendChild(_measurer);
  }
  _measurer.innerHTML = viaInner(1, meds, offset, 1, 1);
  return _measurer.scrollHeight;
}

// Distribui os medicamentos em folhas conforme a altura disponível
function paginate(meds){
  if(!meds.length) return [[]];         // uma folha, prescrição vazia
  const pages = [];
  let cur = [], offset = 0;
  for(const med of meds){
    cur.push(med);
    if(cur.length > 1 && measureHeight(cur, offset) > MAX_H_PX){
      const overflow = cur.pop();       // não coube: vai para a próxima folha
      pages.push(cur);
      offset += cur.length;
      cur = [overflow];
    }
  }
  pages.push(cur);
  return pages;
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Gera uma linha rótulo/valor (com escape) usada nos blocos Paciente e Comprador
function frow(label, val){
  return `<div class="frow"><span class="fl">${label}</span><span class="fv">${esc(val)}</span></div>`;
}

function maskCPF(v){
  return (v||'').replace(/\D/g,'')
    .replace(/(\d{3})(\d)/,'$1.$2')
    .replace(/(\d{3})(\d)/,'$1.$2')
    .replace(/(\d{3})(\d{1,2})$/,'$1-$2')
    .substring(0,14);
}

function maskTel(v){
  return (v||'').replace(/\D/g,'')
    .replace(/(\d{2})(\d)/,'($1) $2')
    .replace(/(\d{5})(\d)/,'$1-$2')
    .substring(0,15);
}

let activePage = 0;   // folha exibida na tela (a impressão sempre sai completa)

function update(){
  // aplica máscaras antes de renderizar
  const pacCpfEl = document.getElementById('pac_cpf');
  const cmpCpfEl = document.getElementById('cmp_cpf');
  const telEl = document.getElementById('cmp_tel');

  if(pacCpfEl) pacCpfEl.value = maskCPF(pacCpfEl.value);
  if(cmpCpfEl) cmpCpfEl.value = maskCPF(cmpCpfEl.value);
  if(telEl) telEl.value = maskTel(telEl.value);

  // monta as folhas (cria novas automaticamente se faltar espaço)
  const pages = paginate(getMeds());
  activePage = Math.max(0, Math.min(pages.length - 1, activePage));

  let sheets = '', offset = 0;
  pages.forEach((pageMeds, i) => {
    sheets += '<div class="a4">'
            +   `<div class="via">${viaInner(1, pageMeds, offset, i+1, pages.length)}</div>`
            +   `<div class="via">${viaInner(2, pageMeds, offset, i+1, pages.length)}</div>`
            + '</div>';
    offset += pageMeds.length;
  });

  const pager = pages.length > 1
    ? '<div class="pager">'
      + '<button type="button" class="pager-prev" onclick="gotoPage(-1)">◀ Folha anterior</button>'
      + '<span class="pager-info"></span>'
      + '<button type="button" class="pager-next" onclick="gotoPage(1)">Próxima folha ▶</button>'
      + '</div>'
    : '';

  document.querySelector('.preview').innerHTML = pager + '<div class="sheets">' + sheets + '</div>';
  applyActive();
}

// Mostra apenas a folha ativa na tela e atualiza os botões/indicador
function applyActive(){
  const sheets = document.querySelectorAll('.preview .a4');
  const multi = sheets.length > 1;
  sheets.forEach((s, i) => s.classList.toggle('a4--hide', multi && i !== activePage));
  const info = document.querySelector('.pager-info');
  if(info) info.textContent = `Folha ${activePage + 1} de ${sheets.length}`;
  const prev = document.querySelector('.pager-prev');
  const next = document.querySelector('.pager-next');
  if(prev) prev.disabled = activePage === 0;
  if(next) next.disabled = activePage === sheets.length - 1;
}

function gotoPage(delta){
  const total = document.querySelectorAll('.preview .a4').length;
  activePage = Math.max(0, Math.min(total - 1, activePage + delta));
  applyActive();
}

// ── Linhas de medicamento (loop dinâmico na barra lateral) ────
function formaOptions(){
  return '<option value="" selected>— selecione —</option>'
       + FORMAS.map(f => `<option>${f}</option>`).join('');
}

function posOptions(){
  return '<option value="" selected>— selecione —</option>'
       + POSOLOGIAS.map(p => `<option>${p}</option>`).join('')
       + '<option value="__outra__">Outra (especificar)…</option>';
}

// Mostra/esconde a caixa livre quando "Outra" é escolhida
function onPosChange(sel){
  const livre = sel.parentElement.querySelector('.m-pos-livre');
  const isOutra = sel.value === '__outra__';
  livre.style.display = isOutra ? '' : 'none';
  if(!isOutra) livre.value = '';
  if(isOutra) livre.focus();
  update();
}

function addMed(){
  const row = document.createElement('div');
  row.className = 'med-row';
  row.innerHTML =
      '<div class="med-row-head">'
    +   '<span class="med-num"></span>'
    +   '<button class="med-del" type="button" title="Remover" onclick="removeMed(this)">✕</button>'
    + '</div>'
    + '<div class="f"><label>Medicamento</label>'
    +   '<input class="m-nome" placeholder="Ex: Dipirona" oninput="update()"></div>'
    + '<div class="f"><label>Dose / concentração</label>'
    +   '<input class="m-dose" list="dl-dose" placeholder="Ex: 500mg" oninput="update()"></div>'
    + '<div class="f"><label>Forma farmacêutica</label>'
    +   '<select class="m-forma" onchange="update()">' + formaOptions() + '</select></div>'
    + '<div class="f"><label>Posologia</label>'
    +   '<select class="m-pos-sel" onchange="onPosChange(this)">' + posOptions() + '</select>'
    +   '<input class="m-pos-livre" placeholder="Descreva a posologia" oninput="update()" style="display:none;margin-top:5px"></div>'
    + '<div class="f"><label>Fornecimento (tempo de tratamento e/ou quantidade fornecida)</label>'
    +   '<input class="m-fornecimento-livre" placeholder="Ex: 1 comprimido a cada 6 horas por 2 dias = 9 comprimidos" oninput="update()"></div>'
    + '<div class="f"><label>Duração do tratamento</label>'
    +   '<input class="m-duracao-livre" placeholder="Ex: 2 dias / 30 dias / uso contínuo" oninput="update()"></div>'
    + '<div class="f"><label>Recomendações</label>'
    +   '<input class="m-recomendacoes-livre" placeholder="Ex: Se dor/febre" oninput="update()"></div>';
  document.getElementById('meds').appendChild(row);
  renumberMeds();
  update();
}

function removeMed(btn){
  btn.closest('.med-row').remove();
  if(!document.querySelector('#meds .med-row')){ addMed(); return; }
  renumberMeds();
  update();
}

function renumberMeds(){
  document.querySelectorAll('#meds .med-row').forEach((r, i) => {
    r.querySelector('.med-num').textContent = 'Medicamento ' + (i + 1);
  });
}

function clearForm(){
  ['pac_nome','pac_end','pac_cpf','pac_pass','data','prescritor',
   'cmp_nome','cmp_cpf','cmp_pass','cmp_end','cmp_cidade','cmp_tel'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('meds').innerHTML = '';
  addMed();   // recria uma linha de medicamento vazia (já chama update)
}

addMed();   // inicia com uma linha de medicamento e renderiza
</script>
