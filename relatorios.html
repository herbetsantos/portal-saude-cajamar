<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios — Portal Saúde Cajamar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="app-topbar"></div>

<main class="page">
  <div class="page__header">
    <div class="eyebrow">Indicadores</div>
    <h1 class="page__title">Relatórios</h1>
    <p class="page__subtitle">Dashboards de produtividade e indicadores da Secretaria de Saúde.</p>
  </div>

  <div id="listArea">
    <div class="skeleton-loading">Carregando relatórios…</div>
  </div>

  <div id="embedArea" style="display:none">
    <a href="#" id="backToList" class="report-back-link">← Voltar aos relatórios</a>
    <div class="report-frame-wrap">
      <iframe id="reportFrame" class="report-frame" src="" title="Relatório" allowfullscreen></iframe>
    </div>
  </div>
</main>

<script src="/js/common.js"></script>
<script>
  (async () => {
    const user = await initPortalChrome('relatorios');
    if (!user) return;

    const listArea = document.getElementById('listArea');
    const embedArea = document.getElementById('embedArea');
    const frame = document.getElementById('reportFrame');

    document.getElementById('backToList').addEventListener('click', (e) => {
      e.preventDefault();
      frame.src = '';
      embedArea.style.display = 'none';
      listArea.style.display = '';
      history.replaceState(null, '', '/relatorios.html');
    });

    let items = [];

    function showEmbed(report) {
      frame.src = report.embed_url;
      listArea.style.display = 'none';
      embedArea.style.display = '';
      history.replaceState(null, '', `/relatorios.html?id=${report.id}`);
    }

    function render() {
      listArea.innerHTML = items.length
        ? `<div class="doc-list">${items.map((it) => `
            <a class="doc-row" href="${escapeAttr(it.embed_url)}" ${it.display_mode === 'new_tab' ? 'target="_blank" rel="noopener"' : ''} data-report="${it.id}">
              <span class="cross">✚</span>
              <div style="flex:1">
                <div class="doc-row__title">${escapeHtml(it.title)}</div>
                ${it.description ? `<div class="doc-row__desc">${escapeHtml(it.description)}</div>` : ''}
              </div>
            </a>
          `).join('')}</div>`
        : `<div class="empty-state">Nenhum relatório disponível para o seu usuário no momento.</div>`;

      listArea.querySelectorAll('[data-report]').forEach((row) => {
        const report = items.find((it) => String(it.id) === row.dataset.report);
        if (!report || report.display_mode === 'new_tab') return;
        row.addEventListener('click', (e) => {
          e.preventDefault();
          showEmbed(report);
        });
      });
    }

    try {
      const res = await fetch('/api/my-reports', { credentials: 'same-origin' });
      const data = await res.json();
      items = data.reports || [];
      render();

      const params = new URLSearchParams(window.location.search);
      const requestedId = params.get('id');
      if (requestedId) {
        const report = items.find((it) => String(it.id) === requestedId && it.display_mode !== 'new_tab');
        if (report) showEmbed(report);
      }
    } catch {
      listArea.innerHTML = `<div class="empty-state">Não foi possível carregar os relatórios.</div>`;
    }
  })();
</script>
</body>
</html>
