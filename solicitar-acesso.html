<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solicitar acesso — Portal Saúde Cajamar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-shell">
    <div class="login-card login-card--wide">
      <div class="brand"><img src="/assets/CAJAMAR PREFEITURA.png" alt="Prefeitura de Cajamar — Saúde"></div>
      <div class="login-title">Solicitar acesso</div>
      <div class="login-subtitle">Preencha seus dados. Um administrador vai analisar e liberar seu acesso.</div>

      <div id="formMsg" class="form-msg"></div>

      <form id="signupForm">
        <div class="field">
          <label for="name">Nome completo</label>
          <input type="text" id="name" required autofocus>
        </div>
        <div class="field">
          <label for="username">Usuário desejado</label>
          <input type="text" id="username" required pattern="[a-z0-9._-]{3,32}" title="Letras minúsculas, números, ponto, hífen ou underline">
        </div>
        <div class="field">
          <label for="unidade">Unidade de lotação</label>
          <input type="text" id="unidade" required placeholder="Ex.: UBS Jardim..., Secretaria, etc.">
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" required minlength="8">
        </div>
        <div class="field">
          <label for="confirmPassword">Confirmar senha</label>
          <input type="password" id="confirmPassword" required minlength="8">
        </div>
        <button type="submit" class="btn btn--accent" id="submitBtn">Enviar solicitação</button>
      </form>

      <div class="login-foot"><a href="/login.html">Já tenho acesso — voltar ao login</a></div>
    </div>
  </div>

  <script>
    const form = document.getElementById('signupForm');
    const msg = document.getElementById('formMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'form-msg';
      msg.textContent = '';

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        msg.className = 'form-msg is-error';
        msg.textContent = 'As senhas não coincidem.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Enviando…';

      try {
        const res = await fetch('/api/signup-requests', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            username: document.getElementById('username').value.trim().toLowerCase(),
            unidade: document.getElementById('unidade').value,
            password,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Não foi possível enviar a solicitação.');

        form.style.display = 'none';
        msg.className = 'form-msg is-ok';
        msg.textContent = 'Solicitação enviada! Assim que um administrador aprovar, você poderá entrar normalmente com o usuário e senha escolhidos.';
      } catch (err) {
        msg.className = 'form-msg is-error';
        msg.textContent = err.message;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Enviar solicitação';
      }
    });
  </script>
</body>
</html>
